name: GitHub Pages Redirect

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create redirect page
        run: |
          mkdir out
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=https://personal-website-seven-teal-22.vercel.app">
              <script>window.location.replace("https://personal-website-seven-teal-22.vercel.app" + window.location.pathname.replace("/personal-website", ""));</script>
            </head>
            <body>Redirecting...</body>
          </html>
          EOF
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - uses: actions/deploy-pages@v4
        id: deployment
